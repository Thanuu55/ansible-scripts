---
- name: for practice
  hosts: dev
  user: ansible
  become: yes
  connection: ssh
  gather_facts: no

  # -------------------------------------------------------------------------------------------------------------
  # using playbook to install nginx

  ---
- name: for practice
  hosts: dev
  user: ansible
  become: yes
  connection: ssh
  gather_facts: no
  tasks:
  - name: installing nginx on ubuntu
    command: apt install nginx -y

    # ----------------------------------------------------------------------------------------------------------

  # using playbook to uninstall nginx
---
  - name: for practice
    hosts: dev
    user: ansible
    become: yes
    connection: ssh
    gather_facts: no
    tasks:
    - name: uninstalling nginx on ubuntu
    command: apt remove  nginx -y
