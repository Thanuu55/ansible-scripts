# Tasks section using apt module

---
  - name: for practice
    hosts: dev
    user: ansible
    become: yes
    connection: ssh
    gather_facts: no
    tasks:
    - name: install apache2
      apt:
      name: apache2
      state: present
    - name: start the service
      service:
      name: apache2
      state: started

