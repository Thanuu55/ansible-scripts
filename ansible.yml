# Tasks section with variable section
---
- name: Tasks section with variable section
  hosts: dev
  user: ansible
  become: yes
  connection: ssh
  gather_facts: no
  vars:
     web_package: nginx
     web_services: nginx
     tasks:
     - name: update apt update_cache
       apt:
       update_cache: yes
- name: install web server
  apt:
- name: "{{web_package}}"
  state: present
- name: start web server service
  service:
  name: "{{web_service}}"
  state: started
